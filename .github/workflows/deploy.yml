name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy Admin (Dashboard)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="/www/server/nvm/versions/node/v24.13.0/bin:$PATH"
            cd /www/wwwroot/agjdbook
            
            git checkout .
            git pull origin main
            
            cd dashboard
            echo "VITE_IS_LOCAL=false" > .env
            npm install --legacy-peer-deps && npm run build
            cd ../backend
            npm install --legacy-peer-deps
            pm2 restart agjdbook || pm2 start server.js --name agjdbook

      - name: Deploy Client
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="/www/server/nvm/versions/node/v24.13.0/bin:$PATH"
            cd /www/wwwroot/jdbook
            
            git checkout .
            git pull origin main
            
            cd client
            echo "VITE_IS_LOCAL=false" > .env
            npm install --legacy-peer-deps && npm run build
            cd ../backend
            npm install --legacy-peer-deps
            pm2 restart jdbook || pm2 start server.js --name jdbook

      - name: Notify Success
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ Deployed successfully on VPS
          Commit: ${{ github.sha }}
          By: ${{ github.actor }}"

      - name: Notify Failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="❌ Deployment FAILED
          Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"